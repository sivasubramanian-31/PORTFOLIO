<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siva Subramanian M | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="animation-container">
        <canvas id="hero-lightpass"></canvas>
        <div class="scroll-hint">Scroll to Explore My Journey</div>
    </section>

    <main class="content-overlay">
        <section class="intro">
            <h1>Siva Subramanian M</h1>
            <p>ECE Student & Software Developer</p>
        </section>
    </main>

    <div id="chat-widget" class="chat-closed">
        <div id="chat-header">
            <span>Ask My AI Assistant</span>
            <button id="close-chat">×</button>
        </div>
        <div id="chat-body">
            <div class="message bot-msg">Hi! I'm Siva's AI. Ask me about his experience or skills!</div>
        </div>
        <div id="chat-footer">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <button id="chat-toggle">💬</button>

    <script src="script.js"></script>
</body>
</html>
